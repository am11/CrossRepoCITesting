name: bsd-x64-disk-check

on:
  workflow_dispatch:
    inputs:
      runtimeForkName:
        description: fork
        required: true
        default: dotnet
      runtimeBranchName:
        description: branch
        required: true
        default: main

jobs:
  build-openbsd:
    name: OpenBSD x64 Build
    runs-on: ubuntu-latest

    steps:
    - name: Maximize build space
      uses: AdityaGarg8/remove-unwanted-software@v4.1
      with:
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-cached-tools: 'true'

    - name: Clone Runtime
      run: |
        git clone https://github.com/${{ github.event.inputs.runtimeForkName }}/runtime --branch ${{ github.event.inputs.runtimeBranchName }} --single-branch --depth 1
        echo "git HEAD is at: $(git -C runtime rev-parse HEAD)"

    - name: Run Build and Capture Snapshots
      run: |
        docker run --rm -v$(pwd)/runtime:/runtime -e ROOTFS_DIR=/crossrootfs/x64 \
          mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net11.0-cross-openbsd-amd64@sha256:496173363516799f0fb86ae2a03dffaa46bb07a40764997d7fef591cc4fd21ba \
          sh -c '
          ls -d /*/ | xargs du -sh > /runtime/before_openbsd 2>/dev/null
          
          /runtime/build.sh -ci -arch x64 -os openbsd -cross -s clr+libs+host+packs+tools.cdac -c Checked -rc Checked --bootstrap
          
          ls -d /*/ | xargs du -sh > /runtime/after_openbsd 2>/dev/null
          ' || true

    - name: Print Disk Snapshots
      if: always()
      run: |
        echo "=== BEFORE BUILD (OPENBSD CONTAINER) ==="
        cat runtime/before_openbsd 2>/dev/null || echo "File not found"
        echo "=== AFTER BUILD (OPENBSD CONTAINER) ==="
        cat runtime/after_openbsd 2>/dev/null || echo "File not found"

  build-freebsd:
    name: FreeBSD x64 Build
    runs-on: ubuntu-latest

    steps:
    - name: Maximize build space
      uses: AdityaGarg8/remove-unwanted-software@v4.1
      with:
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-cached-tools: 'true'

    - name: Clone Runtime
      run: |
        git clone https://github.com/${{ github.event.inputs.runtimeForkName }}/runtime --branch ${{ github.event.inputs.runtimeBranchName }} --single-branch --depth 1

    - name: Run Build and Capture Snapshots
      run: |
        docker run --rm -v$(pwd)/runtime:/runtime -e ROOTFS_DIR=/crossrootfs/x64 \
          mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net11.0-cross-freebsd-14-amd64@sha256:368e1641ba6e57c9ae294e0a123ac0703227d30971a3e795c9ec2d7d36936790 \
          sh -c '
          ls -d /*/ | xargs du -sh > /runtime/before_freebsd 2>/dev/null
          
          /runtime/build.sh -ci -arch x64 -os freebsd -cross -s clr+libs+host+packs+tools.cdac -c Checked -rc Checked --bootstrap
          
          ls -d /*/ | xargs du -sh > /runtime/after_freebsd 2>/dev/null
          ' || true

    - name: Print Disk Snapshots
      if: always()
      run: |
        echo "=== BEFORE BUILD (FREEBSD CONTAINER) ==="
        cat runtime/before_freebsd 2>/dev/null || echo "File not found"
        echo "=== AFTER BUILD (FREEBSD CONTAINER) ==="
        cat runtime/after_freebsd 2>/dev/null || echo "File not found"
