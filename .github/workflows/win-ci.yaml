name: win-testing

on: [workflow_dispatch]

jobs:
  build:

    runs-on: windows-latest
    timeout-minutes: 9999


    steps:
      - name: Native RDP with Pinggy
        env:
          RDP_PASS: ${{ secrets.RDP_PASSWORD }}
        run: |
          # 1. Turn on the Windows RDP Server & update credentials
          net user runneradmin "$env:RDP_PASS"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 2. Start the SSH tunnel as a separate system process to prevent crashes
          $sshProcess = Start-Process ssh -ArgumentList "-p 443 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -R 0:127.0.0.1:3389 tcp@free.pinggy.io" -RedirectStandardOutput "pinggy.log" -PassThru
          
          # 3. Wait a few seconds for Pinggy to generate your link
          Start-Sleep -Seconds 6
          
          # 4. Read and display the generated address directly into your build logs
          Get-Content "pinggy.log"
          
          # 5. Keep the runner awake while you use RDP
          while ($true) { Start-Sleep -Seconds 60 }
