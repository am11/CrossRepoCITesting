name: RDP Debug Windows
on: workflow_dispatch # Manually trigger from the GitHub UI

jobs:
  rdp-job:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Uses the active marketplace action for reverse RDP tunneling
      - name: Setup RDP Connection
        uses: NyaMisty/reverse-rdp-windows-github-actions-ng@master
        with:
          # Your ngrok token from repository secrets
          ngrok-token: ${{ secrets.NGROK_AUTH_TOKEN }}
          # The password you want to use when logging in over RDP
          password: ${{ secrets.RDP_PASSWORD }} 
