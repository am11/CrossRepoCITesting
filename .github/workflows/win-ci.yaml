name: RDP Debug Windows
on: workflow_dispatch # Run manually when you need to debug

jobs:
  rdp-job:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Installs ngrok and starts the RDP service on the runner
      - name: Setup RDP Connection
        uses: alor/action-rdp@v1.1
        with:
          # Add your ngrok token to your GitHub Repository Secrets
          ngrok-token: ${{ secrets.NGROK_AUTH_TOKEN }}
          # Set a custom password for the runner's Administrator account
          password: ${{ secrets.RDP_PASSWORD }} 
