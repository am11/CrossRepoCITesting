name: RDP Debug Windows
on: workflow_dispatch # Allows you to manually trigger it from the UI

jobs:
  rdp-job:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Replaced with the active marketplace action
      - name: Setup RDP Connection
        uses: sushichop/action-rdp@v1
        with:
          # Your ngrok token from your repository secrets
          ngrok-token: ${{ secrets.NGROK_AUTH_TOKEN }}
          # The password you want to use when logging in over RDP
          rdp-password: ${{ secrets.RDP_PASSWORD }} 
