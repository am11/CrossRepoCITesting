name: win-testing

on: [workflow_dispatch]

jobs:
  build:

    runs-on: windows-latest
    timeout-minutes: 9999


    steps:
      - name: Native RDP with Pinggy
        env:
          RDP_PASS: ${{ secrets.RDP_PASSWORD }}
        run: |
          # 1. Turn on the Windows RDP Server & update credentials
          net user runneradmin "$env:RDP_PASS"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 2. Run the SSH tunnel inline inside a background thread job
          $job = Start-ThreadJob -ScriptBlock {
              ssh -p 443 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=10 -R 0:127.0.0.1:3389 tcp@free.pinggy.io
          }
          
          # 3. Stream the live terminal output straight to the GitHub log
          Write-Host "Waiting for Pinggy to generate your RDP address..."
          Start-Sleep -Seconds 5
          Receive-Job -Job $job -Keep
          
          # 4. Keep the runner awake while you use RDP
          while ($true) { Start-Sleep -Seconds 60 }
