name: win-testing

on: [workflow_dispatch]

jobs:
  build:

    runs-on: windows-latest
    timeout-minutes: 9999


    steps:
      - name: Native RDP with Pinggy
        env:
          RDP_PASS: ${{ secrets.RDP_PASSWORD }}
        run: |
          # 1. Turn on the Windows RDP Server & update credentials: Random1
          net user runneradmin "$env:RDP_PASSWORD"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 2. Build the exact arguments for Pinggy's TCP tunnel
          $sshArgs = @("-p", "443", "-o", "StrictHostKeyChecking=no", "-o", "ServerAliveInterval=30", "-R", "0:127.0.0.1:3389", "tcp@free.pinggy.io")
          
          # 3. Fire up the actual SSH tunnel in a separate background job
          Start-Job -ScriptBlock { ssh $using:sshArgs } | Out-Null
          Start-Sleep -Seconds 5
          
          # 4. Extract and display the live URL and port generated by Pinggy
          Get-Job | Receive-Job
          
          # 5. Prevent the GitHub runner from shutting down while you log in
          while ($true) { Start-Sleep -Seconds 60 }
