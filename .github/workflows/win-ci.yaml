name: win-testing

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # GitHub Action runners cap out at 6 hours max

    steps:
      - name: Native RDP with Pinggy
        env:
          RDP_PASS: ${{ secrets.RDP_PASSWORD }}
        run: |
          # 1. Turn on the Windows RDP Server & update credentials
          net user runneradmin "$env:RDP_PASS"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 2. Open the firewall for the local RDP port
          Enable-NetFirewallRule -Name RemoteDesktop-UserMode-In-TCP
          
          # 3. Launch SSH directly using PowerShell's background process runner.
          # -T bypasses the TTY terminal allocation error.
          # We remove -N so Pinggy is allowed to print out the URL string before it starts forwarding.
          Write-Host "Connecting to Pinggy... Please wait for your public address table..."
          
          $Expression = 'ssh -p 443 -T -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=10 -R 0:127.0.0.1:3389 tcp@free.pinggy.io'
          
          # This command handles background threading on Windows cleanly without swallowing exit states
          $powershellCmd = "powershell -Command `"$Expression`""
          $process = [System.Diagnostics.Process]::Start("cmd.exe", "/c $powershellCmd")
          
          # 4. Wait for the tunnel connection to initialize and display on screen
          Start-Sleep -Seconds 10
          
          # 5. Keep the runner awake infinitely while you use the active tunnel
          while ($true) { Start-Sleep -Seconds 60 }
