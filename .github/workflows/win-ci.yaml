name: win-testing

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Native RDP with Pinggy
        env:
          RDP_PASS: ${{ secrets.RDP_PASSWORD }}
        run: |
          # 1. Turn on the Windows RDP Server & update credentials
          net user runneradmin "$env:RDP_PASS"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Enable-NetFirewallRule -Name RemoteDesktop-UserMode-In-TCP
          
          # 2. Fire up SSH in a completely separate Windows process block
          # We send all output lines directly to a temporary log file on the runner drive
          $sshArgs = "/c ssh -p 443 -T -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=10 -R 0:127.0.0.1:3389 tcp@free.pinggy.io > %TEMP%\pinggy.log 2>&1"
          [System.Diagnostics.Process]::Start("cmd.exe", $sshArgs) | Out-Null
          
          # 3. Wait a few seconds for the network tunnel connection handshake
          Write-Host "Connecting to Pinggy network..."
          Start-Sleep -Seconds 8
          
          # 4. Continuously read the log file so new output shows up live
          Write-Host "Tunnel loop started. Monitoring log for RDP address..."
          $logPath = "$env:TEMP\pinggy.log"
          
          while ($true) {
              if (Test-Path $logPath) {
                  # -Tail 10 reads only new or recent lines to prevent log spamming
                  Get-Content $logPath -Tail 10 | Select-Object -Unique
              }
              Start-Sleep -Seconds 5
          }
